<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TX Safety — VLM Prompt Generator</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{--bg0:#07090d;--bg1:#0d1117;--bg2:#141b24;--bg3:#1c2433;--bg4:#232f40;--border:rgba(99,140,200,0.12);--border-hi:rgba(99,180,255,0.28);--t0:#dde6f0;--t1:#9aafc4;--t2:#5c7291;--t3:#2e3f55;--blue:#4da6ff;--blue-dim:rgba(77,166,255,0.12);--green:#3dd68c;--green-dim:rgba(61,214,140,0.12);--purple:#b39dfa;--purple-dim:rgba(179,157,250,0.12);--red:#ff5f5f;--red-dim:rgba(255,80,80,0.12);--orange:#ffaa4d;--orange-dim:rgba(255,170,77,0.12);--font:'IBM Plex Sans',sans-serif;--mono:'IBM Plex Mono',monospace}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg0);color:var(--t0);font-family:var(--font);font-size:13px;min-height:100vh}
#hdr{display:flex;align-items:center;justify-content:space-between;padding:10px 18px;background:var(--bg1);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100}
.hdr-l{display:flex;align-items:center;gap:12px}
.logo{font-family:var(--mono);font-size:11px;font-weight:600;color:var(--blue);letter-spacing:.15em}
.hdr-title{font-size:14px;font-weight:600}
.hdr-sub{font-size:10px;color:var(--t2);font-family:var(--mono)}
.hdr-r{display:flex;align-items:center;gap:10px}
.pill{font-family:var(--mono);font-size:10px;padding:3px 8px;border-radius:3px;border:1px solid}
.pill-blue{border-color:rgba(77,166,255,.3);background:var(--blue-dim);color:var(--blue)}
.pill-green{border-color:rgba(61,214,140,.3);background:var(--green-dim);color:var(--green)}
#wrap{display:grid;grid-template-columns:280px 1fr;height:calc(100vh - 44px)}
#sidebar{background:var(--bg1);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.sb-section{border-bottom:1px solid var(--border);padding:12px 14px}
.sb-label{font-family:var(--mono);font-size:9px;font-weight:600;letter-spacing:.12em;color:var(--t2);text-transform:uppercase;margin-bottom:8px}
.sb-stats{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.stat-box{background:var(--bg2);border-radius:4px;padding:8px 10px;text-align:center}
.stat-n{font-family:var(--mono);font-size:20px;font-weight:600;line-height:1}
.stat-l{font-size:9px;color:var(--t2);margin-top:2px}
.persona-btn{display:flex;align-items:center;gap:8px;width:100%;padding:7px 10px;border-radius:4px;border:1px solid transparent;background:transparent;cursor:pointer;text-align:left;transition:all .15s;margin-bottom:4px}
.persona-btn:hover{background:var(--bg3);border-color:var(--border)}
.persona-btn.active{border-color:var(--border-hi);background:var(--bg3)}
.persona-badge{font-family:var(--mono);font-size:9px;font-weight:600;padding:2px 6px;border-radius:2px;min-width:34px;text-align:center}
.persona-name{font-size:11px;color:var(--t1)}
.persona-count{margin-left:auto;font-family:var(--mono);font-size:10px;color:var(--t2)}
.sev-row{display:flex;gap:5px;flex-wrap:wrap}
.sev-btn{font-family:var(--mono);font-size:10px;font-weight:600;padding:3px 10px;border-radius:3px;border:1px solid;background:transparent;cursor:pointer;transition:opacity .15s;letter-spacing:.05em}
.sev-btn.active{opacity:1}.sev-btn:not(.active){opacity:.35}
.s-P1{border-color:rgba(255,80,80,.5);color:var(--red)}
.s-P2{border-color:rgba(255,170,77,.5);color:var(--orange)}
.s-P3{border-color:rgba(77,166,255,.5);color:var(--blue)}
.s-P4{border-color:rgba(61,214,140,.5);color:var(--green)}
.type-list{display:flex;flex-direction:column;gap:2px;max-height:200px;overflow-y:auto;scrollbar-width:thin;scrollbar-color:var(--bg4) transparent}
.type-btn{display:flex;align-items:center;justify-content:space-between;padding:4px 8px;border-radius:3px;border:none;background:transparent;cursor:pointer;font-size:11px;color:var(--t1);transition:background .1s}
.type-btn:hover{background:var(--bg3)}
.type-btn.active{background:var(--bg3);color:var(--t0)}
.type-n{font-family:var(--mono);font-size:10px;color:var(--t2)}
#main{display:flex;flex-direction:column;overflow:hidden}
#toolbar{display:flex;align-items:center;gap:10px;padding:8px 16px;background:var(--bg1);border-bottom:1px solid var(--border);flex-shrink:0;flex-wrap:wrap}
.tb-label{font-family:var(--mono);font-size:10px;color:var(--t2)}
.sort-btn{font-family:var(--mono);font-size:10px;padding:3px 9px;border-radius:3px;border:1px solid var(--border);background:transparent;color:var(--t1);cursor:pointer;transition:all .15s}
.sort-btn.active{background:var(--blue-dim);border-color:var(--blue);color:var(--blue)}
.sort-btn:hover:not(.active){border-color:var(--border-hi)}
.spacer{flex:1}
#search-input{font-family:var(--mono);font-size:11px;background:var(--bg2);border:1px solid var(--border);border-radius:3px;color:var(--t0);padding:4px 10px;width:200px;outline:none}
#search-input:focus{border-color:var(--blue)}
#search-input::placeholder{color:var(--t3)}
.export-btn{font-family:var(--mono);font-size:10px;padding:4px 12px;border-radius:3px;border:1px solid rgba(179,157,250,.4);background:var(--purple-dim);color:var(--purple);cursor:pointer;letter-spacing:.05em}
.export-btn:hover{background:rgba(179,157,250,.2)}
#prompt-list{flex:1;overflow-y:auto;padding:12px 16px;display:flex;flex-direction:column;gap:8px;scrollbar-width:thin;scrollbar-color:var(--bg4) transparent}
.prompt-card{background:var(--bg2);border:1px solid var(--border);border-radius:6px;overflow:hidden;cursor:pointer;transition:border-color .15s;flex-shrink:0}
.prompt-card:hover{border-color:var(--border-hi)}
.prompt-card.expanded{border-color:var(--border-hi)}
.pc-header{display:flex;align-items:center;gap:8px;padding:10px 14px}
.pc-sev{font-family:var(--mono);font-size:9px;font-weight:600;padding:2px 7px;border-radius:2px;flex-shrink:0}
.pc-sev-P1{background:var(--red-dim);color:var(--red);border:1px solid rgba(255,80,80,.3)}
.pc-sev-P2{background:var(--orange-dim);color:var(--orange);border:1px solid rgba(255,170,77,.3)}
.pc-sev-P3{background:var(--blue-dim);color:var(--blue);border:1px solid rgba(77,166,255,.3)}
.pc-sev-P4{background:var(--green-dim);color:var(--green);border:1px solid rgba(61,214,140,.3)}
.pc-type{font-size:12px;font-weight:500;flex:1}
.pc-loc{font-size:11px;color:var(--t2);font-family:var(--mono)}
.pc-persona-badge{font-family:var(--mono);font-size:9px;font-weight:600;padding:2px 6px;border-radius:2px}
.pc-time{font-family:var(--mono);font-size:9px;color:var(--t3)}
.pc-chevron{color:var(--t2);font-size:12px;transition:transform .2s;flex-shrink:0}
.prompt-card.expanded .pc-chevron{transform:rotate(90deg)}
.pc-title{padding:0 14px 8px;font-size:11px;color:var(--t1);line-height:1.4}
.pc-body{display:none;border-top:1px solid var(--border)}
.prompt-card.expanded .pc-body{display:block}
.pc-tabs{display:flex;border-bottom:1px solid var(--border)}
.pc-tab{font-family:var(--mono);font-size:10px;padding:7px 14px;cursor:pointer;border-bottom:2px solid transparent;color:var(--t2);transition:all .15s;margin-bottom:-1px}
.pc-tab.active{color:var(--blue);border-bottom-color:var(--blue)}
.pc-tab:hover:not(.active){color:var(--t1)}
.pc-pane{display:none;padding:14px}
.pc-pane.active{display:block}
.prompt-text{font-family:var(--mono);font-size:11px;line-height:1.7;color:var(--t1);white-space:pre-wrap;word-break:break-word;max-height:400px;overflow-y:auto;scrollbar-width:thin;scrollbar-color:var(--bg4) transparent}
.pc-actions{display:flex;gap:8px;padding:10px 14px;border-top:1px solid var(--border);background:var(--bg1)}
.act-btn{font-family:var(--mono);font-size:10px;padding:5px 12px;border-radius:3px;border:1px solid var(--border);background:transparent;color:var(--t1);cursor:pointer;transition:all .15s;letter-spacing:.04em}
.act-btn:hover{border-color:var(--border-hi);color:var(--t0)}
.act-btn-copy{border-color:rgba(77,166,255,.4);color:var(--blue);background:var(--blue-dim)}
.act-btn-copy:hover{background:rgba(77,166,255,.2)}
.act-btn-copied{border-color:rgba(61,214,140,.4)!important;color:var(--green)!important;background:var(--green-dim)!important}
.meta-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.meta-item{background:var(--bg1);border-radius:4px;padding:8px 10px}
.meta-key{font-family:var(--mono);font-size:9px;color:var(--t2);margin-bottom:3px;letter-spacing:.06em}
.meta-val{font-size:11px;color:var(--t0);line-height:1.4}
.cam-list{display:flex;flex-direction:column;gap:4px;margin-top:4px}
.cam-item{font-size:11px;color:var(--t1);padding:3px 0;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;gap:6px}
.cam-item::before{content:"\25B8";color:var(--blue);font-size:9px;margin-top:2px;flex-shrink:0}
#loading{display:flex;flex-direction:column;align-items:center;justify-content:center;height:200px;color:var(--t2);font-family:var(--mono);font-size:12px;gap:8px}
#empty{display:none;flex-direction:column;align-items:center;justify-content:center;height:200px;color:var(--t2);font-family:var(--mono);font-size:12px;gap:8px}
.spinner{width:24px;height:24px;border:2px solid var(--bg4);border-top-color:var(--blue);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div id="hdr">
  <div class="hdr-l">
    <div class="logo">TX-SAFE</div>
    <div>
      <div class="hdr-title">VLM Prompt Generator</div>
      <div class="hdr-sub">Video Surveillance Intelligence &middot; 3 Operator Personas &middot; port 8006</div>
    </div>
  </div>
  <div class="hdr-r">
    <a href="/" style="color:var(--t2);font-family:var(--mono);font-size:10px;text-decoration:none;border:1px solid var(--border);padding:3px 8px;border-radius:3px">&#8592; Dashboard</a>
    <span class="pill pill-blue" id="incident-count">Loading...</span>
    <span class="pill pill-green" id="prompt-count">0 prompts</span>
  </div>
</div>
<div id="wrap">
  <div id="sidebar">
    <div class="sb-section">
      <div class="sb-label">Overview</div>
      <div class="sb-stats">
        <div class="stat-box"><div class="stat-n" id="st-incidents" style="color:var(--blue)">&#8212;</div><div class="stat-l">Incidents</div></div>
        <div class="stat-box"><div class="stat-n" id="st-prompts" style="color:var(--purple)">&#8212;</div><div class="stat-l">Prompts</div></div>
        <div class="stat-box"><div class="stat-n" id="st-p1" style="color:var(--red)">&#8212;</div><div class="stat-l">P1 Critical</div></div>
        <div class="stat-box"><div class="stat-n" id="st-p2" style="color:var(--orange)">&#8212;</div><div class="stat-l">P2 High</div></div>
      </div>
    </div>
    <div class="sb-section">
      <div class="sb-label">Operator Persona</div>
      <button class="persona-btn active" onclick="setPersona(this,'all')">
        <span class="persona-badge" style="background:rgba(90,90,100,.3);color:#aaa">ALL</span>
        <span class="persona-name">All Personas</span>
        <span class="persona-count" id="pc-all">0</span>
      </button>
      <button class="persona-btn" onclick="setPersona(this,'law_enforcement')">
        <span class="persona-badge" style="background:var(--blue-dim);color:var(--blue)">LE</span>
        <span class="persona-name">Law Enforcement</span>
        <span class="persona-count" id="pc-law_enforcement">0</span>
      </button>
      <button class="persona-btn" onclick="setPersona(this,'city_official')">
        <span class="persona-badge" style="background:var(--purple-dim);color:var(--purple)">GOV</span>
        <span class="persona-name">City Official</span>
        <span class="persona-count" id="pc-city_official">0</span>
      </button>
      <button class="persona-btn" onclick="setPersona(this,'physical_security')">
        <span class="persona-badge" style="background:var(--green-dim);color:var(--green)">SOC</span>
        <span class="persona-name">Physical Security</span>
        <span class="persona-count" id="pc-physical_security">0</span>
      </button>
    </div>
    <div class="sb-section">
      <div class="sb-label">Severity</div>
      <div class="sev-row">
        <button class="sev-btn s-P1 active" onclick="toggleSev(this,'P1')">P1</button>
        <button class="sev-btn s-P2 active" onclick="toggleSev(this,'P2')">P2</button>
        <button class="sev-btn s-P3 active" onclick="toggleSev(this,'P3')">P3</button>
        <button class="sev-btn s-P4 active" onclick="toggleSev(this,'P4')">P4</button>
      </div>
    </div>
    <div class="sb-section" style="flex:1;overflow:hidden;display:flex;flex-direction:column">
      <div class="sb-label">Incident Type</div>
      <div class="type-list" id="type-list"></div>
    </div>
  </div>
  <div id="main">
    <div id="toolbar">
      <span class="tb-label">Sort:</span>
      <button class="sort-btn active" onclick="setSort(this,'severity')">Severity</button>
      <button class="sort-btn" onclick="setSort(this,'time')">Time</button>
      <button class="sort-btn" onclick="setSort(this,'type')">Type</button>
      <div class="spacer"></div>
      <input id="search-input" type="text" placeholder="Search incidents..." oninput="applyFilters()">
      <button class="export-btn" onclick="exportAllJSON()">&#11041; Export JSON</button>
    </div>
    <div id="prompt-list">
      <div id="loading"><div class="spinner"></div>Loading incident prompts from 8006...</div>
      <div id="empty" style="display:none">No prompts match current filters</div>
    </div>
  </div>
</div>
<script>
const API=`${location.protocol}//${location.host}`;
let allPrompts=[],activePersona='all',activeSeverities=new Set(['P1','P2','P3','P4']),activeTypes=new Set(),sortBy='severity',searchQuery='';
const PCOL={law_enforcement:'#4da6ff',city_official:'#b39dfa',physical_security:'#3dd68c'};
const PBADGE={law_enforcement:'LE',city_official:'GOV',physical_security:'SOC'};
const SORD={P1:0,P2:1,P3:2,P4:3};

async function loadPrompts(){
  const loadingEl=document.getElementById('loading');
  try{
    const r=await fetch(`${API}/api/vlm/prompts?hours=24&limit=100`);
    const data=await r.json();
    allPrompts=data.prompts||[];
    if(loadingEl) loadingEl.style.display='none';
    if(data.demo){
      document.getElementById('incident-count').textContent='Demo data (no live incidents)';
      document.getElementById('incident-count').style.borderColor='rgba(255,170,77,.4)';
      document.getElementById('incident-count').style.color='var(--orange)';
      document.getElementById('incident-count').style.background='var(--orange-dim)';
    }
    updateStats();buildTypeList();applyFilters();
  }catch(e){
    if(loadingEl) loadingEl.innerHTML=`<div style="color:var(--red);font-family:var(--mono);font-size:11px;text-align:center">Failed: ${e.message}<br><br>Ensure server is running on port 8006.</div>`;
  }
}

function updateStats(){
  const incs=new Set(allPrompts.map(p=>p.incident_id));
  document.getElementById('st-incidents').textContent=incs.size;
  document.getElementById('st-prompts').textContent=allPrompts.length;
  document.getElementById('st-p1').textContent=new Set(allPrompts.filter(p=>p.severity==='P1').map(p=>p.incident_id)).size;
  document.getElementById('st-p2').textContent=new Set(allPrompts.filter(p=>p.severity==='P2').map(p=>p.incident_id)).size;
  document.getElementById('incident-count').textContent=`${incs.size} incidents (24h)`;
  document.getElementById('prompt-count').textContent=`${allPrompts.length} prompts`;
  ['law_enforcement','city_official','physical_security'].forEach(pk=>{
    const el=document.getElementById(`pc-${pk}`);
    if(el) el.textContent=allPrompts.filter(p=>p.persona===pk).length;
  });
  document.getElementById('pc-all').textContent=allPrompts.length;
}

function buildTypeList(){
  const counts={};
  allPrompts.forEach(p=>{const t=p.incident_type||'Other';counts[t]=(counts[t]||0)+1;});
  Object.keys(counts).forEach(t=>activeTypes.add(t));
  const sorted=Object.entries(counts).sort((a,b)=>b[1]-a[1]);
  document.getElementById('type-list').innerHTML=sorted.map(([t,n])=>
    `<button class="type-btn active" data-type="${t}" onclick="toggleType(this,'${t}')">`+
    `<span>${t}</span><span class="type-n">${n}</span></button>`).join('');
}

function applyFilters(){
  searchQuery=document.getElementById('search-input').value.toLowerCase();
  let f=allPrompts.filter(p=>{
    if(activePersona!=='all'&&p.persona!==activePersona)return false;
    if(!activeSeverities.has(p.severity))return false;
    if(!activeTypes.has(p.incident_type||'Other'))return false;
    if(searchQuery){
      const hay=`${p.incident_type} ${p.location} ${p.persona_label} ${(p.metadata||{}).scene_context||''}`.toLowerCase();
      if(!hay.includes(searchQuery))return false;
    }
    return true;
  });
  if(sortBy==='severity') f.sort((a,b)=>(SORD[a.severity]||3)-(SORD[b.severity]||3));
  else if(sortBy==='time') f.sort((a,b)=>new Date(b.metadata?.reported_at||0)-new Date(a.metadata?.reported_at||0));
  else if(sortBy==='type') f.sort((a,b)=>(a.incident_type||'').localeCompare(b.incident_type||''));
  renderPrompts(f);
}

function renderPrompts(prompts){
  const list=document.getElementById('prompt-list');
  const empty=document.getElementById('empty');
  if(!prompts.length){list.innerHTML='';list.appendChild(empty);empty.style.display='flex';return;}
  empty.style.display='none';
  window._fp=prompts;
  list.innerHTML=prompts.map((p,idx)=>{
    const pcol=PCOL[p.persona]||'#4da6ff';
    const pbadge=PBADGE[p.persona]||'?';
    const cams=((p.metadata||{}).recommended_cameras||[]).map(c=>`<div class="cam-item">${esc(c)}</div>`).join('');
    const intro=(p.system_prompt||'').split('INCIDENT CONTEXT')[0].replace(/You are[^.]+\./,'').trim().slice(0,140)||p.incident_type;
    return `<div class="prompt-card" id="c${idx}">
      <div class="pc-header" onclick="toggle(${idx})">
        <span class="pc-sev pc-sev-${p.severity}">${p.severity}</span>
        <span class="pc-type">${esc(p.incident_type||'Incident')}</span>
        <span class="pc-loc">${esc(p.location||'TX')}</span>
        <span class="pc-persona-badge" style="background:${pcol}22;color:${pcol};border:1px solid ${pcol}44">${pbadge}</span>
        <span class="pc-time">${age(p.metadata?.reported_at)}</span>
        <span class="pc-chevron">&#9658;</span>
      </div>
      <div class="pc-title">${esc(intro)}</div>
      <div class="pc-body">
        <div class="pc-tabs">
          <div class="pc-tab active" onclick="tab(event,'s${idx}')">System Prompt</div>
          <div class="pc-tab" onclick="tab(event,'u${idx}')">User Prompt</div>
          <div class="pc-tab" onclick="tab(event,'m${idx}')">Metadata</div>
        </div>
        <div class="pc-pane active" id="s${idx}"><div class="prompt-text">${esc(p.system_prompt||'')}</div></div>
        <div class="pc-pane" id="u${idx}"><div class="prompt-text">${esc(p.user_prompt||'')}</div></div>
        <div class="pc-pane" id="m${idx}">
          <div class="meta-grid">
            <div class="meta-item"><div class="meta-key">URGENCY</div><div class="meta-val" style="color:var(--orange)">${esc((p.metadata||{}).urgency||'')}</div></div>
            <div class="meta-item"><div class="meta-key">TIME SENSITIVITY</div><div class="meta-val">${esc((p.metadata||{}).time_sensitivity||'')}</div></div>
            <div class="meta-item"><div class="meta-key">SCENE CONTEXT</div><div class="meta-val">${esc((p.metadata||{}).scene_context||'')}</div></div>
            <div class="meta-item"><div class="meta-key">OPERATOR</div><div class="meta-val" style="color:${pcol}">${esc(p.persona_label||'')}</div></div>
          </div>
          <div style="margin-top:10px"><div class="meta-key" style="margin-bottom:6px">RECOMMENDED CAMERAS</div>
          <div class="cam-list">${cams||'<div style="color:var(--t2);font-size:11px">None specified</div>'}</div></div>
        </div>
        <div class="pc-actions">
          <button class="act-btn act-btn-copy" onclick="cp(event,${idx})">&#11041; Copy System + User</button>
          <button class="act-btn" onclick="cp(event,${idx},'system')">Copy System</button>
          <button class="act-btn" onclick="cp(event,${idx},'user')">Copy User</button>
          <button class="act-btn" onclick="dl(${idx})">Export JSON</button>
        </div>
      </div>
    </div>`;
  }).join('');
}

function toggle(i){document.getElementById(`c${i}`).classList.toggle('expanded');}
function tab(e,id){
  e.stopPropagation();
  const body=e.target.closest('.pc-body');
  body.querySelectorAll('.pc-tab').forEach(t=>t.classList.remove('active'));
  body.querySelectorAll('.pc-pane').forEach(p=>p.classList.remove('active'));
  e.target.classList.add('active');
  document.getElementById(id).classList.add('active');
}
function cp(e,i,which){
  e.stopPropagation();
  const p=(window._fp||allPrompts)[i];if(!p)return;
  let t=which==='system'?p.system_prompt:which==='user'?p.user_prompt:
    `SYSTEM PROMPT:\n${'='.repeat(60)}\n${p.system_prompt}\n\nUSER PROMPT:\n${'='.repeat(60)}\n${p.user_prompt}`;
  navigator.clipboard.writeText(t||'').then(()=>{
    const b=e.target,o=b.textContent;
    b.textContent='Copied!';b.classList.add('act-btn-copied');
    setTimeout(()=>{b.textContent=o;b.classList.remove('act-btn-copied');},2000);
  });
}
function dl(i){
  const p=(window._fp||allPrompts)[i];if(!p)return;
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([JSON.stringify(p,null,2)],{type:'application/json'}));
  a.download=`vlm_${p.incident_id}_${p.persona}.json`;a.click();
}
function exportAllJSON(){
  const p=window._fp||allPrompts;
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([JSON.stringify({exported_at:new Date().toISOString(),count:p.length,prompts:p},null,2)],{type:'application/json'}));
  a.download=`tx_vlm_prompts_${new Date().toISOString().slice(0,10)}.json`;a.click();
}
function setPersona(btn,p){document.querySelectorAll('.persona-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');activePersona=p;applyFilters();}
function toggleSev(btn,s){btn.classList.toggle('active');activeSeverities.has(s)?activeSeverities.delete(s):activeSeverities.add(s);applyFilters();}
function toggleType(btn,t){btn.classList.toggle('active');activeTypes.has(t)?activeTypes.delete(t):activeTypes.add(t);applyFilters();}
function setSort(btn,s){document.querySelectorAll('.sort-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');sortBy=s;applyFilters();}
function age(dt){if(!dt)return'';try{const m=Math.floor((Date.now()-new Date(dt))/60000);return m<1?'now':m<60?m+'m ago':Math.floor(m/60)+'h ago';}catch{return dt||'';}}
function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
loadPrompts();
setInterval(loadPrompts,60000);
</script>
</body>
